notes: |
  This entry is the canonical illustration of the verbalization motivation:
  Mathlib spells the lemma `Nat.Prime.dvd_mul`, but no working mathematician
  would say "by Nat.Prime.dvd_mul" — they would say "by Euclid's lemma."
  The short_form field encodes exactly that substitution.
