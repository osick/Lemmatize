notes: |
  Lean and textbooks reach the same conclusion via slightly different
  rhetorical moves: Lean prefers an explicit construction (smallest prime
  factor of n! + 1), while textbooks usually frame the same construction
  inside a proof-by-contradiction shell. Both routes are recorded.
